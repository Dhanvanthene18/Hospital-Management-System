{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Add New Patient</h2>

<div class="card shadow p-4">

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Patient ID</label>
                <input type="text" class="form-control" name="patient_id" placeholder="P001" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Patient Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" name="age" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Gender</label>

                <select class="form-select" name="gender">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Blood Group</label>

                <select class="form-select" name="blood_group">
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                </select>

            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Doctor</label>
                <input type="text" class="form-control" name="doctor">
            </div>

            <div class="col-md-12 mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="3" name="address"></textarea>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Disease</label>
                <input type="text" class="form-control" name="disease">
            </div>

            <div class="col-md-3 mb-3">
                <label class="form-label">Admission Date</label>
                <input type="date" class="form-control" name="admission_date">
            </div>

            <div class="col-md-3 mb-3">
                <label class="form-label">Status</label>

                <select class="form-select" name="status">
                    <option>Admitted</option>
                    <option>Discharged</option>
                    <option>Under Treatment</option>
                </select>

            </div>

        </div>

        <button type="submit" class="btn btn-success">
            Save Patient
        </button>

        <a href="{{ url_for('patients') }}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
