{% extends "base.html" %}

{% block title %}Edit Doctor{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>Edit Doctor</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Doctor ID</label>
<input type="text" class="form-control"
name="doctor_id"
value="{{ doctor.doctor_id }}">
</div>

<div class="col-md-6 mb-3">
<label>Doctor Name</label>
<input type="text" class="form-control"
name="name"
value="{{ doctor.name }}">
</div>

<div class="col-md-4 mb-3">
<label>Specialization</label>
<input type="text" class="form-control"
name="specialization"
value="{{ doctor.specialization }}">
</div>

<div class="col-md-4 mb-3">
<label>Qualification</label>
<input type="text" class="form-control"
name="qualification"
value="{{ doctor.qualification }}">
</div>

<div class="col-md-4 mb-3">
<label>Experience</label>
<input type="number" class="form-control"
name="experience"
value="{{ doctor.experience }}">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" class="form-control"
name="phone"
value="{{ doctor.phone }}">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control"
name="email"
value="{{ doctor.email }}">
</div>

<div class="col-md-6 mb-3">
<label>Consultation Fee</label>
<input type="number" class="form-control"
name="consultation_fee"
value="{{ doctor.consultation_fee }}">
</div>

<div class="col-md-6 mb-3">
<label>Availability</label>

<select class="form-control" name="availability">

<option {% if doctor.availability=="Available" %}selected{% endif %}>
Available
</option>

<option {% if doctor.availability=="Unavailable" %}selected{% endif %}>
Unavailable
</option>

<option {% if doctor.availability=="On Leave" %}selected{% endif %}>
On Leave
</option>

</select>

</div>

</div>

<button class="btn btn-success">
Update Doctor
</button>

<a href="{{ url_for('doctors') }}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
